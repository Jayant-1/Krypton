version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krypton-backend
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - SECRET_KEY=dev-insecure-key-please-change-in-production
      - DATABASE_PATH=/app/data/research_agent.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      - CACHE_TTL_MINUTES=30
      - MAX_RESULTS_DEFAULT=20
      - MAX_RESULTS_LIMIT=50
      - GEMINI_MODEL=gemini-2.5-flash
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    networks:
      - krypton-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Add frontend service for full stack testing
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     - VITE_API_BASE_URL=http://backend:8080
  #   depends_on:
  #     - backend
  #   networks:
  #     - krypton-network

networks:
  krypton-network:
    driver: bridge

volumes:
  krypton-data:
    driver: local
